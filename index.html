<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--blue-light:#EFF6FF;--blue-mid:#DBEAFE;--blue-hover:#1D4ED8;
  --gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-300:#CBD5E1;
  --gray-400:#94A3B8;--gray-500:#64748B;--gray-600:#475569;--gray-700:#334155;
  --gray-800:#1E293B;--gray-900:#0F172A;
  --green:#16A34A;--green-light:#F0FDF4;--red:#DC2626;--red-light:#FEF2F2;
  --orange:#D97706;--orange-light:#FFFBEB;--teal:#0D9488;--teal-light:#F0FDFA;
  --purple:#7C3AED;--purple-light:#F5F3FF;
  --radius:8px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.05);
}
body{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif;font-size:13px;background:var(--gray-50);color:var(--gray-800);}
.app{min-height:100vh;}

/* ── Layout: 全页固定，表格区域内部滚动 ── */
html,body{height:100%;overflow:hidden;}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.page-header{flex-shrink:0;background:#fff;border-bottom:1px solid var(--gray-200);padding:14px 24px;display:flex;align-items:center;gap:10px;}
.page-header-icon{width:32px;height:32px;background:var(--blue-light);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:16px;}
.page-header h1{font-size:16px;font-weight:600;color:var(--gray-900);}
.search-panel{flex-shrink:0;background:#fff;margin:12px 20px 0;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 20px 10px;}
.cards-wrap{flex-shrink:0;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:12px 20px 0;}
/* list-panel 占满剩余高度 */
.list-panel{flex:1 1 0;background:#fff;margin:12px 20px 12px;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.list-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--gray-100);}
.rc-bar{flex-shrink:0;padding:6px 20px 4px;font-size:12px;color:var(--gray-400);}
.info-bar{flex-shrink:0;padding:6px 20px 0;}
/* table-wrap 占满剩余高度，横纵双向滚动 */
.table-wrap{flex:1 1 0;overflow:auto;min-height:0;}
/* 固定表头 */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 12px;font-size:11px;font-weight:600;color:var(--gray-400);background:var(--gray-50);border-bottom:1px solid var(--gray-200);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px;
  position:sticky;top:0;z-index:10;}
td{padding:11px 12px;border-bottom:1px solid var(--gray-50);color:var(--gray-700);white-space:nowrap;vertical-align:middle;}
tr:hover td{background:#FAFCFF;}
tr.er td{background:var(--red-light);}
tr.er:hover td{background:#FEE2E2;}

/* 分页器固定在底部 */
.pg-wrap{flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:10px 20px;border-top:1px solid var(--gray-100);background:#fff;}
.search-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.sf{display:flex;flex-direction:column;gap:4px;}
.sf label{font-size:12px;color:var(--gray-500);font-weight:500;}
.sf input,.sf select{height:34px;padding:0 12px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:13px;color:var(--gray-800);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;min-width:120px;}
.sf input:focus,.sf select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.sf input::placeholder{color:var(--gray-300);}
.search-actions{display:flex;gap:8px;align-items:flex-end;margin-left:auto;padding-bottom:0;}
.btn{height:34px;padding:0 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:none;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-hover);}
.btn-secondary{background:#fff;color:var(--gray-600);border:1px solid var(--gray-200);}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);}
.btn-ghost{background:transparent;color:var(--gray-500);border:1px solid var(--gray-200);}
.btn-ghost:hover{background:var(--gray-50);color:var(--blue);}
.btn-sm{height:28px;padding:0 10px;font-size:12px;}
.btn-danger{background:#fff;color:var(--red);border:1px solid var(--gray-200);}
.btn-danger:hover{border-color:var(--red);background:var(--red-light);}

/* ── Condition Bar ── */
.cond-bar{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;min-height:24px;}
.cond-label{font-size:12px;color:var(--gray-400);}
.cond-tag{display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-mid);border-radius:4px;padding:2px 8px;font-size:12px;}
.cond-tag .x{cursor:pointer;opacity:.6;font-size:11px;margin-left:2px;}
.cond-tag .x:hover{opacity:1;}
.sct-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--gray-700);transition:background .1s;user-select:none;}
.sct-item:hover{background:var(--gray-50);}
.sct-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;}

/* ── Cards ── */
.cards-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:16px 20px 0;}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;cursor:pointer;border:2px solid transparent;border-left-width:4px;border-left-color:transparent;transition:all .18s;position:relative;overflow:hidden;}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--gray-200);border-left-color:var(--gray-300);}
.card.cur{border-left-color:var(--blue);background:#FAFCFF;}
.card.cur .card-num{color:var(--blue);}
.card.cur .card-title{color:var(--blue);}
.card-icon-wrap{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.ic-blue{background:var(--blue-light);}
.ic-green{background:var(--green-light);}
.ic-orange{background:var(--orange-light);}
.ic-red{background:var(--red-light);}
.card-num{font-size:32px;font-weight:700;color:var(--gray-800);line-height:1.1;margin-bottom:4px;}
.card-title{font-size:13px;font-weight:500;color:var(--gray-500);margin-bottom:6px;}
.card-sub{font-size:11px;color:var(--gray-400);line-height:1.6;white-space:pre-line;}

/* ── List Panel ── */
.list-panel{background:#fff;margin:16px 20px 20px;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--gray-100);}
.tabs{display:flex;}
.tab{padding:14px 16px;font-size:13px;font-weight:500;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--gray-700);}
.tab.cur{color:var(--blue);border-bottom-color:var(--blue);}
.tab-count{display:inline-block;background:var(--gray-100);color:var(--gray-500);border-radius:10px;padding:0 6px;font-size:11px;font-weight:600;margin-left:4px;}
.tab.cur .tab-count{background:var(--blue-mid);color:var(--blue);}
.list-actions{display:flex;gap:8px;align-items:center;padding:8px 0;}
.btn-icon{display:inline-flex;align-items:center;gap:5px;}

/* ── Table ── */
.table-wrap{overflow-x:auto;}
.rc-bar{padding:8px 20px 6px;font-size:12px;color:var(--gray-400);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 12px;font-size:11px;font-weight:600;color:var(--gray-400);background:var(--gray-50);border-bottom:1px solid var(--gray-100);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px;}
td{padding:11px 12px;border-bottom:1px solid var(--gray-50);color:var(--gray-700);white-space:nowrap;vertical-align:middle;}
tr:hover td{background:#FAFCFF;}
tr.er td{background:var(--red-light);}
tr.er:hover td{background:#FEE2E2;}

.chk{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;}
.name-link{color:var(--blue);font-weight:500;cursor:pointer;text-decoration:none;}
.name-link:hover{text-decoration:underline;}
.emp-empty{text-align:center;padding:40px;color:var(--gray-400);font-size:13px;}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;}
.t-blue{background:var(--blue-light);color:var(--blue);}
.t-gray{background:var(--gray-100);color:var(--gray-500);}
.t-orange{background:var(--orange-light);color:var(--orange);}
.t-green{background:var(--green-light);color:var(--green);}
.t-red{background:var(--red-light);color:var(--red);}
.t-teal{background:var(--teal-light);color:var(--teal);}
.t-purple{background:var(--purple-light);color:var(--purple);}

/* ── RPA cell ── */
.rpa-cell{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;max-width:220px;}
.rpa-suc{color:var(--green);}.rpa-fail{color:var(--red);font-weight:600;}.rpa-pend{color:var(--orange);}

/* ── Action buttons in table ── */
.abtn{height:28px;padding:0 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--gray-200);background:#fff;color:var(--gray-600);transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.abtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.abtn.blue{background:var(--blue);border-color:var(--blue);color:#fff;}
.abtn.blue:hover{background:var(--blue-hover);}

/* ── File tag ── */
.ft{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--blue);padding:2px 6px;background:var(--blue-light);border-radius:4px;border:1px solid var(--blue-mid);white-space:nowrap;}

/* ── Ins cell tooltip ── */
.ins-cell{display:inline-block;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;cursor:default;position:relative;}
.ins-cell:hover .ins-tip{display:block;}
.ins-tip{display:none;position:fixed;z-index:9999;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);padding:10px 14px;font-size:12px;color:var(--gray-700);line-height:1.9;max-width:280px;white-space:normal;word-break:break-all;pointer-events:none;}
.ins-tip-item{display:flex;align-items:center;gap:7px;}
.ins-tip-item::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;}


/* ── Pagination ── */

.pg-txt{font-size:12px;color:var(--gray-400);margin-right:4px;}
.pb{min-width:32px;height:32px;padding:0 8px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);cursor:pointer;background:#fff;color:var(--gray-600);font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;}
.pb:hover{border-color:var(--blue);color:var(--blue);}
.pb.cur{background:var(--blue);border-color:var(--blue);color:#fff;}
.pb:disabled{cursor:not-allowed;color:var(--gray-300);border-color:var(--gray-100);}
.pg-size{height:32px;padding:0 8px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:12px;background:#fff;color:var(--gray-600);cursor:pointer;}
.pg-jump{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500);margin-left:8px;}
.pg-jump input{width:48px;height:32px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);text-align:center;font-size:12px;outline:none;}
.pg-jump input:focus{border-color:var(--blue);}

/* ── Modal ── */
.modal-mask{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.modal-mask.show{display:flex;}
.modal-box{background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);width:760px;max-width:94vw;max-height:90vh;display:flex;flex-direction:column;animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(-20px) scale(.97)}to{opacity:1;transform:none}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid var(--gray-100);}
.modal-hd h3{font-size:15px;font-weight:600;color:var(--gray-900);}
.modal-close{background:none;border:none;font-size:18px;color:var(--gray-400);cursor:pointer;line-height:1;padding:4px;border-radius:6px;transition:all .15s;}
.modal-close:hover{color:var(--gray-700);background:var(--gray-100);}
.modal-bd{padding:20px 24px;overflow-y:auto;flex:1;}
.modal-ft{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid var(--gray-100);background:var(--gray-50);border-radius:0 0 12px 12px;}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;}
.mfield{display:flex;flex-direction:column;gap:5px;}
.mfield label{font-size:12px;color:var(--gray-500);font-weight:500;}
.mfield label .req{color:var(--red);margin-left:2px;}
.mfield .mval{height:34px;padding:0 12px;border:1px solid var(--gray-100);border-radius:var(--radius-sm);font-size:13px;color:var(--gray-500);background:var(--gray-50);display:flex;align-items:center;}
.mfield input.minput,.mfield select.mselect{height:34px;padding:0 12px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:13px;color:var(--gray-800);background:#fff;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;}
.mfield input.minput:focus,.mfield select.mselect:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.modal-note{display:none;}
.mfield-group-title{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.8px;text-transform:uppercase;padding:10px 0 4px;border-bottom:1px solid var(--gray-100);margin-bottom:4px;}
.mfield-group-title:first-child{padding-top:0;}

</style>

  // [社保状态, 公积金状态]
  const STATE_MATRIX={
    '大参林医药集团': ['已缴费',     '已缴费'],
    '大参林（广州）':  ['已缴费',     '已核定未缴费'],

  };
  const SB_AMOUNTS={
    '大参林医药集团':128420,'大参林（广州）':84210,'大参林（漯河）':31640,

  };
  const GJJ_AMOUNTS={
    '大参林医药集团':96300,'大参林（广州）':63080,'大参林（漯河）':24890,
    '大参林（佛山）':17200,'大参林（武汉）':32400,'大参林（成都）':28600,
  };
  const CNT_MAP={
    '大参林医药集团':42,'大参林（广州）':31,'大参林（漯河）':13,
    '大参林（佛山）':9, '大参林（武汉）':18,'大参林（成都）':16,
  };

  const rows=[];
  let idxCounter=1;

  MONTHS.forEach(function(month){
    const my=month.replace('-','');
    UNITS.forEach(function(unit,ui){
      const cnt=CNT_MAP[unit.name]||10;
      // 根据月份略微浮动金额
      const monthOffset=MONTHS.indexOf(month);
      const amtVar=1+(monthOffset-3)*0.012;

      function makeRow(acctField, acctNo, bizType, state, baseAmt, sysIdx){
        // 每条记录只有一个账号字段有值，其余为空
        if(!acctNo || !state) return null;
        const id='A'+String(idxCounter++).padStart(2,'0');
        const isErr=state==='缴费异常';
        const isDiff=state==='差异待确认';
        const isDone=state==='已缴费';
        const isConfirmed=state==='已核定未缴费';
        const createDay=String(5+(ui%6)+sysIdx).padStart(2,'0');
        const confirmDay=String(7+(ui%5)+sysIdx).padStart(2,'0');
        const deductDay=String(10+(ui%4)+sysIdx).padStart(2,'0');
        const stateChangDay=String(8+(ui%5)+sysIdx).padStart(2,'0');

        return {
          id:id, month:month, name:unit.name,
          city:unit.city,
          sbNo:      acctField==='sbNo'      ? acctNo : '',
          sbNoYLiao: acctField==='sbNoYLiao' ? acctNo : '',
          sbNoYL:    acctField==='sbNoYL'    ? acctNo : '',
          gjjNo:     acctField==='gjjNo'     ? acctNo : '',
          biz_type:  bizType,
          sys_type:  bizType==='公积金' ? '公积金系统' : '社保系统',
          payUuid:'PAY-'+my+'-'+String(ui*4+sysIdx+1).padStart(3,'0'),
          createTime:month+'-'+createDay,
          pay_state:state,
          remark:isErr?'账户余额不足，扣款失败':isDiff?'金额与核定不一致':'',
          amount:isDone||isConfirmed||isDiff?'¥'+amt.toLocaleString():'',
          cnt:isDone||isConfirmed||isDiff?cnt:0,
          diff:isDiff?'缴费金额有差异':isDone||isConfirmed?'无差异':'',
          confirmTime:isDone||isConfirmed?month+'-'+confirmDay:'',
          deductDate:isDone?month+'-'+deductDay:'',
          stateChangeTime:isDone||isErr||isDiff?month+'-'+stateChangDay:'',
          lnj:isErr?'¥'+String(Math.round(amt*0.0005)):'',
          files:isDone?[{name:'数据源文件.xlsx',t:1},{name:'缴费凭证.pdf',t:2}]
                :isDiff||isConfirmed?[{name:'数据源文件.xlsx',t:1}]:[],
          isErr:isErr||isDiff
        };
      }

      const states=STATE_MATRIX[unit.name]||['未核对','未核对'];
      const sbAmt=SB_AMOUNTS[unit.name]||30000;
      const gjjAmt=GJJ_AMOUNTS[unit.name]||20000;
      // 有哪个账号就生成哪条记录，每条记录只有一个账号字段有值
      if(unit.sbNo)      rows.push(makeRow('sbNo',      unit.sbNo,      '社保',  states[0], sbAmt,                  0));
      if(unit.sbNoYLiao) rows.push(makeRow('sbNoYLiao', unit.sbNoYLiao, '社保',  states[0], Math.round(sbAmt*0.30), 1));
      if(unit.sbNoYL)    rows.push(makeRow('sbNoYL',    unit.sbNoYL,    '社保',  states[0], Math.round(sbAmt*0.45), 2));
      if(unit.gjjNo)     rows.push(makeRow('gjjNo',     unit.gjjNo,     '公积金',states[1], gjjAmt,                 3));
    });
  });

  return rows;
})();

function getSct(){

function sctChange(){
  const vals=getSct();
  const total=document.querySelectorAll('.sct-opt').length;
  const allCb=document.getElementById('sct-all');
  allCb.checked=vals.length===total;
  allCb.indeterminate=vals.length>0&&vals.length<total;
  const btn=document.getElementById('sct-btn');
  const txt=vals.length===0||vals.length===total?'全部':vals.length===1?vals[0]:`${vals.length} 项已选`;
  const isActive=vals.length>0&&vals.length<total;
  btn.style.color=isActive?'var(--blue)':'var(--gray-500)';
  btn.style.borderColor=isActive?'var(--blue)':'var(--gray-200)';
  btn.style.background=isActive?'var(--blue-light)':'#fff';
  btn.childNodes[0].textContent=txt+' ';
  render();
}
function sctToggleAll(cb){
  document.querySelectorAll('.sct-opt').forEach(el=>el.checked=cb.checked);
  sctChange();
}
function clearSct(){
  document.querySelectorAll('.sct-opt').forEach(el=>el.checked=false);

function toggleSct(){
  const dd=document.getElementById('sct-dropdown');
  const isOpen=dd.style.display!=='none';
  dd.style.display=isOpen?'none':'block';
  if(!isOpen){
    const close=function(e){
      if(!document.getElementById('sct-wrap').contains(e.target)){
        dd.style.display='none';
        document.removeEventListener('click',close);
      }
    };
    setTimeout(()=>document.addEventListener('click',close),0);
  }
}

  // card 2：缴费台账 — 按当前月份动态计算
  const monthDA=DA.filter(a=>a.month===month);

  if(card===0)rChange(changeData,0);     // 社保公积金变动名单台账（无分页Tab，无RPA列）

  setTimeout(fillOps, 0);

      '核定缴费完成':'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>',
      '重新计算':'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>',
    }[a.l]||'';
    const onclick = a.l==='新增'?(card===0?'openNewRow()':'openNewConfirmRow()'):a.l==='删除'?'deleteSelected()':a.l==='导出'?'alert(\'导出工作台功能开发中\')':a.l==='RPA申报（批量）'?'alert(\'RPA申报发起中\')':a.l==='核定缴费完成'?'confirmPaySelected()':a.l==='重新计算'?'recalcCost()':'';

  return`<div class="list-header"><div class="tabs">${th}</div><div class="list-actions">${ah}</div></div>`;

function pgHtml(tot,PZ){
  const pages=Math.ceil(tot/PZ)||1;
  let h=`<div class="pg-wrap"><span class="pg-txt">共 ${tot} 条</span>`;
  h+=`<button class="pb" onclick="goP(${pg-1})" ${pg<=1?'disabled':''}>‹</button>`;
  const s=Math.max(1,pg-2),e=Math.min(pages,pg+2);
  if(s>1){h+=`<button class="pb" onclick="goP(1)">1</button>`;if(s>2)h+=`<span style="padding:0 4px;color:var(--gray-300)">···</span>`;}
  for(let i=s;i<=e;i++)h+=`<button class="pb${i===pg?' cur':''}" onclick="goP(${i})">${i}</button>`;
  if(e<pages){if(e<pages-1)h+=`<span style="padding:0 4px;color:var(--gray-300)">···</span>`;h+=`<button class="pb" onclick="goP(${pages})">${pages}</button>`;}
  h+=`<button class="pb" onclick="goP(${pg+1})" ${pg>=pages?'disabled':''}>›</button>`;
  h+=`<select class="pg-size"><option>20 条/页</option></select>`;
  h+=`<div class="pg-jump">跳至 <input type="number" min="1" max="${pages}" value="${pg}" onchange="goP(parseInt(this.value)||1)"/> 页</div>`;
  return h+'</div>';
}

function rChange(changeData, mode){
  // mode=0: 变动名单台账（无Tab，无RPA列）
  // mode=1: 申报台账（有Tab，有RPA列）
  const s1=getV('sn'),s2=getV('se'),su=getV('sunit'),sct=getSct(),ssj=getV('ssj');
  const data=changeData.filter(r=>{
    if(s1&&!r.name.includes(s1))return false;
    if(s2&&!r.emp.toLowerCase().includes(s2.toLowerCase()))return false;
    if(su&&r.社保主体!==su&&r.公积金主体!==su&&r.费用主体!==su)return false;
    if(sct.length&&!sct.includes(r.change_type))return false;
    if(ssj&&r.社保主体!==ssj)return false;
    if(mode===1){
      if(vt==='已确认'&&r.名单是否确认!=='是')return false;
      if(vt==='申报失败'&&!r.isErr)return false;
    }
    return true;
  });
  const tot=data.length;
  const sl=data.slice((pg-1)*PZ,pg*PZ);
  sl.forEach(r=>{ _rowCache['ch_'+r.emp]=r; });

  const cols = mode===0 ? CHANGE_COLS : CC;

  // ── 表头区域（含分页Tab） ──
  let headerHtml;
  if(mode===0){
    // 变动名单台账：无分页Tab，直接显示操作按钮栏
    const ah=CF[0].ac.map(a=>{
      const icon={'新增':'','删除':'','导出':'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3"/></svg>'}[a.l]||'';
      const onclick=a.l==='新增'?'openNewRow()':a.l==='删除'?'deleteSelected()':a.l==='导出'?'alert(\'导出工作台功能开发中\')':'';
      const danger=a.l==='删除'?' style="color:var(--red);border-color:var(--gray-200);"':'';
      return`<button class="btn btn-secondary btn-sm btn-icon"${danger} onclick="${onclick}">${icon}${a.l}</button>`;
    }).join('');
    headerHtml=`<div class="list-header"><div class="tabs"></div><div class="list-actions">${ah}</div></div>`;
  } else {
    // 申报台账：有分页Tab
    const confN=changeData.filter(r=>r.名单是否确认==='是').length;
    const failN=changeData.filter(r=>r.isErr).length;
    const tabsWC=[`全部(${changeData.length})`,`已确认(${confN})`,`申报失败(${failN})`];
    const th=tabsWC.map(x=>{
      const xl=x.replace(/\(\d+\)/,'').trim();

      return`<div class="tab${xl===vt?' cur':''}" onclick="svt('${xl}')">${xl}${cnt?`<span class="tab-count">${cnt}</span>`:''}</div>`;
    }).join('');
    // 上传附件按钮是行级按钮，这里只放RPA申报和导出
    const showRPA=vt!=='申报失败';
    const ah=(showRPA?`<button class="btn btn-primary btn-sm btn-icon" onclick="alert('RPA申报发起中')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>RPA申报（批量）</button>`:'')
      +`<button class="btn btn-secondary btn-sm btn-icon" onclick="alert('导出工作台功能开发中')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3"/></svg>导出</button>`;
    headerHtml=`<div class="list-header"><div class="tabs">${th}</div><div class="list-actions">${ah}</div></div>`;
  }

  // ── 信息条 ──

  // ── 行渲染 ──
  const rows = sl.length ? sl.map(r=>{
    const base = rowCells(r);
    let rpaExtra = '';
    if(mode===1){
      const attachHtml = r.附件&&r.附件.length ? r.附件.map(f=>'<span class="ft">📎 '+f.name+'</span>').join(' ') : '';
      const manualTimeHtml = r.manual_time
        ? '<span style="color:var(--gray-500);font-size:12px">'+r.manual_time+'</span>'
        : '';
      const isManual = r.manual_time ? '是' : '否';
      rpaExtra = '<td style="color:var(--gray-400);font-size:12px">'+tx(r.参加工作日期||'')+'</td>'
        +'<td>'+tag(r.是否参加医疗补助||'否')+'</td>'
        +'<td>'+tx(r.就业形式||'雇佣就业')+'</td>'
        +'<td>'+tx(r.所属学校||'')+'</td>'
        +'<td>'+tag(r.申报类型||'')+'</td>'
        +'<td style="color:var(--gray-400);font-size:12px">'+tx(r.rpa_time||'')+'</td>'
        +'<td>'+tag(isManual)+'</td>'
        +'<td>'+rh(r.rpa_items||[])+'</td>'
        +'<td style="color:var(--red);font-size:12px">'+tx(r.rpa_remark||'')+'</td>'
        +'<td>'+manualTimeHtml+'</td>'
        +'<td>'+attachHtml+'</td>';
    }
    // 操作列：避免引号嵌套问题，直接生成带 data 属性的 span，由 fillOps 注入按钮
    const opsSpan = mode===0
      ? '<span class="row-ops-confirm" data-emp="'+r.emp+'"></span>'
      : '<span class="row-ops" data-emp="'+r.emp+'" data-err="'+(r.isErr?1:0)+'" data-vt="'+vt+'"></span>';
    return '<tr class="'+(r.isErr&&mode===1?'er':'')+'">'+base+rpaExtra+'<td style="white-space:nowrap">'+opsSpan+'</td></tr>';
  }).join('') : '<tr><td colspan="'+cols.length+'" class="emp-empty">暂无数据</td></tr>';

  document.getElementById('la').innerHTML=`${headerHtml}
    <div class="rc-bar"><span>共 ${tot} 条记录</span></div>
    <div class="table-wrap"><table>
      <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>${pgHtml(tot,PZ)}`;
}

function rPay(month){
  const tl=vt;
  if(tl==='费用明细台账'){rDetail(month);return;}
  const su=getV('sunit'),ss=getV('ss');
  const accts=DA.filter(a=>{
    if(a.month!==month)return false;
    if(su&&a.name!==su)return false;
    if(ss&&a.sys_type!==ss)return false;
    if(tl==='差异待确认'&&a.diff!=='缴费金额有差异'&&a.diff!=='缴费人数有差异'&&a.diff!=='缴费金额和人数有差异')return false;
    if(tl==='缴费异常'&&a.pay_state!=='缴费异常')return false;
    if(tl==='已缴费'&&a.pay_state!=='已缴费')return false;
    return true;
  });
  const allMonthDA=DA.filter(a=>a.month===month);
  const diffN=allMonthDA.filter(a=>a.diff&&a.diff!=='无差异').length;
  const errN=allMonthDA.filter(a=>a.pay_state==='缴费异常').length;

      <td style="color:#8c8c8c">${tx(a.createTime)}</td>
      <td>${tag(a.pay_state)}</td>
      <td style="color:#f5222d">${tx(a.remark)}</td>

      <td>${tag(a.diff)}</td>

function closeModal(e) {
  if (e && e.target !== document.getElementById('editModal')) return;
  document.getElementById('editModal').classList.remove('show');
  document.body.style.overflow = '';
  _editCtx = null;
}

function saveModal() {
  const box = document.querySelector('.modal-box');
  box.style.opacity = '0.5';
  setTimeout(() => {
    box.style.opacity = '';
    document.getElementById('editModal').classList.remove('show');
    document.body.style.overflow = '';
    _editCtx = null;
  }, 280);
}

function handleUpload(event, empId) {
  const file = event.target.files[0];
  if (!file) return;
  const minKB = 20, maxKB = 80;
  const sizeKB = file.size / 1024;
  if (sizeKB < minKB || sizeKB > maxKB) {
    alert(`附件大小应在 ${minKB}KB～${maxKB}KB 之间，当前文件 ${sizeKB.toFixed(1)}KB`);
    event.target.value = '';
    return;
  }
  const r = _rowCache['ch_' + empId];
  if (r) {
    if (!r.附件) r.附件 = [];
    r.附件.push({name: file.name, type: '员工附件'});
    render();
  }
  event.target.value = '';
}

function recalcCost(){
  const checked=Array.from(document.querySelectorAll('tbody input.chk[data-id]:checked'));
  if(!checked.length){alert('请先勾选要重新计算的账户记录');return;}
  const ids=checked.map(cb=>cb.dataset.id);
  // 找到对应账户行，模拟重新计算（Demo：弹出确认提示）
  const month=getV('smonth');
  const targetAccts=DA.filter(a=>ids.includes(a.id));
  const names=targetAccts.map(a=>a.name+(a.sys_type?'('+a.sys_type+')':'')).join('、');
  if(!confirm('将对以下 '+ids.length+' 条账户记录重新执行费用计算：\n'+names+'\n\n重新计算将按基数×比例重算该账户下所有员工费用明细，确认继续？'))return;
  // Demo：模拟计算中状态后刷新
  const btn=document.querySelector('button[onclick="recalcCost()"]');
  if(btn){
    const origText=btn.innerHTML;
    btn.disabled=true;
    btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> 计算中…';
    setTimeout(function(){
      btn.disabled=false;
      btn.innerHTML=origText;
      alert('重新计算完成（Demo）\n已对 '+ids.length+' 条账户下所有员工费用明细按基数×比例重新计算。');
      render();
    },1200);
  }
}

function fillOps() {
  // 变动名单台账（card=0）：row-ops-confirm → 编辑 + 删除
  document.querySelectorAll('.row-ops-confirm').forEach(function(el) {
    if (el.children.length) return;
    var emp = el.dataset.emp;
    var editBtn = document.createElement('button');
    editBtn.className = 'abtn';
    editBtn.style.cssText = 'font-size:11px;height:26px;padding:0 8px;margin-right:4px';
    editBtn.textContent = '编辑';
    editBtn.onclick = function(e) { e.stopPropagation(); editRow('confirm', 'ch_' + emp); };
    el.appendChild(editBtn);
    var delBtn = document.createElement('button');
    delBtn.className = 'abtn';
    delBtn.style.cssText = 'font-size:11px;height:26px;padding:0 8px;color:var(--red);border-color:var(--gray-200);';
    delBtn.textContent = '删除';
    delBtn.onclick = (function(e){ return function(ev){ ev.stopPropagation(); deleteSingle(e); }; })(emp);
    el.appendChild(delBtn);
  });

  // 申报台账（card=1）：row-ops → 编辑 + 上传附件 + 删除 + 已人工处理（仅申报失败tab）
  document.querySelectorAll('.row-ops').forEach(function(el) {
    if (el.children.length) return;
    var emp = el.dataset.emp;
    var rowVt = el.dataset.vt || '';
    var editBtn = document.createElement('button');
    editBtn.className = 'abtn';
    editBtn.style.cssText = 'font-size:11px;height:26px;padding:0 8px;margin-right:4px';
    editBtn.textContent = '编辑';
    editBtn.onclick = function(e) { e.stopPropagation(); editRow('change', 'ch_' + emp); };
    el.appendChild(editBtn);
    var label = document.createElement('label');
    label.className = 'abtn';
    label.style.cssText = 'font-size:11px;height:26px;padding:0 8px;cursor:pointer;display:inline-flex;align-items:center;margin-right:4px;';
    label.title = '上传附件（20KB～80KB）';
    var input = document.createElement('input');
    input.type = 'file'; input.style.display = 'none';
    input.onchange = (function(empId) { return function(ev) { handleUpload(ev, empId); }; })(emp);
    label.appendChild(input);
    label.appendChild(document.createTextNode('上传附件'));
    el.appendChild(label);
    // 「已人工处理」按钮：仅在「申报失败」tab 展示
    if (rowVt === '申报失败') {
      var manualBtn = document.createElement('button');
      manualBtn.className = 'abtn';
      manualBtn.style.cssText = 'font-size:11px;height:26px;padding:0 8px;margin-right:4px;color:var(--green);border-color:var(--gray-200);';
      manualBtn.textContent = '已人工处理';
      manualBtn.onclick = (function(e){ return function(ev){
        ev.stopPropagation();
        var r = _rowCache['ch_' + e];
        if (!r) return;
        // 将所有险种 status 置为申报成功
        if (r.rpa_items && r.rpa_items.length) {
          r.rpa_items = r.rpa_items.map(function(item){ return {n: item.n, s: '申报成功'}; });
        }
        r.isErr = false;
        r.rpa_remark = '';
        // 写入人工处理时间（当前时间）
        var now = new Date();
        var pad = function(n){ return String(n).padStart(2,'0'); };
        r.manual_time = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
        render();
      }; })(emp);
      el.appendChild(manualBtn);
    }
    var delBtn = document.createElement('button');
    delBtn.className = 'abtn';
    delBtn.style.cssText = 'font-size:11px;height:26px;padding:0 8px;color:var(--red);border-color:var(--gray-200);';
    delBtn.textContent = '删除';
    delBtn.onclick = (function(e){ return function(ev){ ev.stopPropagation(); deleteSingle(e); }; })(emp);
    el.appendChild(delBtn);
  });

  // 缴费台账费用明细：row-ops-cost → 编辑（仅缴费异常）
  document.querySelectorAll('.row-ops-cost').forEach(function(el) {
    if (el.children.length) return;
    var emp = el.dataset.emp;
    var ai  = el.dataset.ai || '';
    var isErr = el.dataset.err === '1';
    if (isErr) {
      var btn = document.createElement('button');
      btn.className = 'abtn';
      btn.style.cssText = 'font-size:11px;height:26px;padding:0 8px';
      btn.textContent = '编辑';
      btn.onclick = function(e) { e.stopPropagation(); editRow('cost', 'co_' + emp + '_' + ai); };
      el.appendChild(btn);
    }
  });
}

function closeNewModal(e){
  if(e && e.target !== document.getElementById('newModal')) return;
  document.getElementById('newModal').classList.remove('show');
  document.body.style.overflow = '';
}

function saveNewRow(){
  const inputs = document.querySelectorAll('#newModalFields [data-key]');
  const missing = [];
  inputs.forEach(el => {
    if(el.closest('.mfield').querySelector('.req') && !el.value.trim())
      missing.push(el.closest('.mfield').querySelector('label').textContent.replace('*','').trim());
  });
  if(missing.length){ alert('请填写必填字段：' + missing.join('、')); return; }
  alert('保存成功（Demo）');
  closeNewModal();
  render();
}

let _delTargets = [];
function deleteSelected(){
  const checked = Array.from(document.querySelectorAll('tbody input.chk:checked'));
  if(!checked.length){ alert('请先勾选要删除的记录'); return; }
  _delTargets = checked.map(cb => cb.closest('tr'));
  document.getElementById('delCount').textContent = _delTargets.length;
  document.getElementById('delModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function deleteSingle(emp){
  _delTargets = [{emp}];
  document.getElementById('delCount').textContent = 1;
  document.getElementById('delModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeDelModal(e){
  if(e && e.target !== document.getElementById('delModal')) return;
  document.getElementById('delModal').classList.remove('show');
  document.body.style.overflow = '';
  _delTargets = [];
}
function confirmDelete(){
  alert('删除成功（Demo）');
  closeDelModal();
  _delTargets = [];
  render();
}

function positionTip(e,el){
  const tip=el.querySelector('.ins-tip');
  if(!tip)return;
  const r=el.getBoundingClientRect();
  tip.style.display='block';
  const tw=tip.offsetWidth,th=tip.offsetHeight;
  let left=r.left,top=r.bottom+6;
  if(left+tw>window.innerWidth-12)left=window.innerWidth-tw-12;
  if(top+th>window.innerHeight-12)top=r.top-th-6;
  tip.style.left=left+'px';
  tip.style.top=top+'px';
}
function hideTip(){
  document.querySelectorAll('.ins-tip').forEach(t=>t.style.display='none');
}
