<script>
function getV(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function tag(v){
  if(!v)return'';
  const M={增员:'t-blue',减员:'t-gray',补缴:'t-orange',调基:'t-teal',月度工单:'t-gray',异地申请:'t-teal',紧急工单:'t-orange',待审核:'t-orange',审核通过:'t-green',截止自动通过:'t-green',已退回:'t-orange',已缴费:'t-green',已核定未缴费:'t-orange',缴费异常:'t-red',未核对:'t-gray',无差异:'t-green',有差异:'t-orange',社保系统:'t-blue',公积金系统:'t-teal',正常参保:'t-blue',异地参保:'t-purple',未缴纳:'t-orange',已缴纳:'t-green',已停保:'t-gray',在保人员:'t-gray',常规:'t-gray',申报失败:'t-red',缴费失败:'t-red',系统计算差异:'t-orange'};
  return`<span class="tag ${M[v]||'t-gray'}">${v}</span>`;
}
function tx(v){return(!v||v==='—')?'':v;}
function rh(items){
  if(!items||!items.length)return'';
  const hf=items.some(i=>i.s==='申报失败'),as=items.every(i=>i.s==='申报成功');
  const c=hf?'rpa-fail':as?'rpa-suc':'rpa-pend';
  const str=items.map(i=>i.n+i.s).join('，');
  return`<span class="rpa-cell ${c}" title="${str}">${str}</span>`;
}
function aS(it){return it&&it.length>0&&it.every(i=>i.s==='申报成功');}
function aF(it){return it&&it.some(i=>i.s==='申报失败');}
function aP(it){return it&&it.some(i=>i.s==='待申报')&&!aF(it);}

const INS_SETS=['基本养老保险、基本医疗保险、失业保险、工伤保险','基本养老保险、基本医疗保险、失业保险、工伤保险、住房公积金','基本养老保险、基本医疗保险、失业保险、工伤保险、生育保险','基本养老保险、基本医疗保险、失业保险、工伤保险、住房公积金、补充住房公积金','基本养老保险、基本医疗保险、失业保险、工伤保险、长期护理险','基本养老保险、基本医疗保险、工伤保险、住房公积金、补充医疗保险','特定人员单项工伤险','基本养老保险、基本医疗保险、失业保险、工伤保险、生育保险、住房公积金'];
const INS_RPA=[['基本养老保险','基本医疗保险','失业保险','工伤保险'],['基本养老保险','基本医疗保险','失业保险','工伤保险','住房公积金'],['基本养老保险','基本医疗保险','失业保险','工伤保险','生育保险'],['基本养老保险','基本医疗保险','失业保险','工伤保险','住房公积金','补充住房公积金'],['基本养老保险','基本医疗保险','失业保险','工伤保险','长期护理险'],['基本养老保险','基本医疗保险','工伤保险','住房公积金','补充医疗保险'],['特定人员单项工伤险'],['基本养老保险','基本医疗保险','失业保险','工伤保险','生育保险','住房公积金']];

function sh(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* 按月份生成数据：2026-03 有完整86条，历史月份数据量递减 */
const MONTH_DATA={};
function genData(month,total){
  const ctd=(()=>{const a=[];for(let i=0;i<Math.round(total*0.49);i++)a.push('增员');for(let i=0;i<Math.round(total*0.33);i++)a.push('减员');for(let i=0;i<Math.round(total*0.08);i++)a.push('补缴');while(a.length<total)a.push('调基');return sh(a);})();
  const srd=(()=>{const a=[];for(let i=0;i<Math.round(total*0.74);i++)a.push('月度工单');for(let i=0;i<Math.round(total*0.19);i++)a.push('异地申请');while(a.length<total)a.push('紧急工单');return sh(a);})();
  const std=(()=>{const a=[];for(let i=0;i<Math.round(total*0.24);i++)a.push('待审核');for(let i=0;i<Math.round(total*0.05);i++)a.push('已退回');for(let i=0;i<Math.round(total*0.05);i++)a.push('待申报');for(let i=0;i<Math.round(total*0.03);i++)a.push('申报失败');while(a.length<total)a.push('申报成功');return sh(a);})();
  function mkR(st,ri){
    if(st==='待审核'||st==='已退回')return[];
    if(st==='待申报')return ri.map(n=>({n,s:'待申报'}));
    if(st==='申报失败'){const fi=new Set([0]);if(ri.length>2)fi.add(1);return ri.map((n,i)=>({n,s:fi.has(i)?'申报失败':'申报成功'}));}
    return ri.map(n=>({n,s:'申报成功'}));
  }
  const rows=[];
  for(let i=0;i<total;i++){

function pgHtml(tot,PZ){
